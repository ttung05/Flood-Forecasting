<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDA · Vietnam Flood Prediction</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#f1f5f9;--card:rgba(255,255,255,.85);--border:rgba(203,213,225,.6);--text:#1e293b;--sub:#475569;--muted:#64748b;--accent:#2563eb;--accent2:#6366f1;--ok:#16a34a;--warn:#d97706;--danger:#dc2626;--glass:rgba(255,255,255,.75);--gborder:rgba(203,213,225,.5)}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(37,99,235,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(99,102,241,.05) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(22,163,74,.04) 0%,transparent 50%);z-index:0;pointer-events:none}
        .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 32px;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06)}
        .topbar-left{display:flex;align-items:center;gap:12px}
        .topbar-left .logo{font-size:20px;font-weight:700;color:var(--accent)}
        .topbar-left .subtitle{font-size:13px;color:var(--muted)}
        .topbar-right{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--sub)}
        .date-badge{background:rgba(56,189,248,.1);color:var(--accent);padding:4px 14px;border-radius:20px;font-weight:600;font-size:13px;border:1px solid rgba(56,189,248,.2)}
        .status-badge{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
        .status-badge.loading{background:rgba(251,191,36,.15);color:var(--warn);border:1px solid rgba(251,191,36,.3)}
        .status-badge.done{background:rgba(52,211,153,.15);color:var(--ok);border:1px solid rgba(52,211,153,.3)}
        .status-badge.error{background:rgba(248,113,113,.15);color:var(--danger);border:1px solid rgba(248,113,113,.3)}
        .main{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:24px 32px 48px}
        .section-title{font-size:17px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
        .section-title .material-icons{font-size:22px;color:var(--accent)}
        .glass-card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--gborder);border-radius:16px;padding:24px;margin-bottom:24px}
        /* Stats Table */
        .stats-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
        .stats-table thead th{background:rgba(56,189,248,.08);color:var(--accent);font-weight:600;text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
        .stats-table thead th:first-child{border-radius:10px 0 0 0}.stats-table thead th:last-child{border-radius:0 10px 0 0}
        .stats-table tbody td{padding:9px 14px;border-bottom:1px solid rgba(51,65,85,.3);color:var(--sub);font-family:'JetBrains Mono',monospace;font-size:12px}
        .stats-table tbody tr:hover td{background:rgba(56,189,248,.04)}
        .stats-table .ch-name{color:var(--text);font-family:'Inter',sans-serif;font-weight:600;font-size:13px}
        .ch-icon{display:inline-flex;width:8px;height:8px;border-radius:50%;margin-right:8px;vertical-align:middle}
        /* Grids */
        .grid-4x2{display:grid;grid-template-columns:1fr;gap:16px;justify-items:center}
        .grid-3x1{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
        .grid-2x1{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
        .plot-cell{background:var(--glass);border:1px solid var(--gborder);border-radius:12px;overflow:hidden;width:100%;max-width:900px}
        .plot-area{width:100%;height:450px}
        .plot-area-lg{width:100%;height:380px}
        /* Info chips */
        .data-info{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
        .info-chip{display:flex;align-items:center;gap:6px;background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);border-radius:8px;padding:8px 14px;font-size:13px}
        .info-chip .label{color:var(--muted)}.info-chip .value{color:var(--text);font-weight:600;font-family:'JetBrains Mono',monospace}
        .flood-ratio-badge{background:linear-gradient(135deg,rgba(248,113,113,.15),rgba(251,191,36,.1));border:1px solid rgba(248,113,113,.3)}
        .flood-ratio-badge .value{color:var(--danger)}
        /* Loading */
        .loading-overlay{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px}
        .loading-overlay .material-icons{animation:spin 1.5s linear infinite;font-size:28px;margin-right:10px}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        /* Responsive */
        @media(max-width:700px){.grid-4x2,.grid-3x1,.grid-2x1{grid-template-columns:1fr}.main{padding:12px 10px 32px}.topbar{padding:10px 14px}}
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:8px;">
                <span class="material-icons" style="color:var(--accent)">water</span>
                <span class="logo">EDA</span>
            </a>
            <span class="subtitle">Exploratory Data Analysis · Flood Prediction</span>
        </div>
        <div class="topbar-right">
            <input type="date" id="date-input" style="background:rgba(241,245,249,.9);color:var(--accent);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;">
            <button id="btn-load" style="background:rgba(37,99,235,.1);color:var(--accent);border:1px solid rgba(37,99,235,.3);border-radius:8px;padding:5px 14px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;">
                <span class="material-icons" style="font-size:14px">refresh</span>Load
            </button>
            <span class="status-badge loading" id="status-badge">
                <span class="material-icons" style="font-size:14px">autorenew</span>
                <span id="status-text">Đang khởi tạo...</span>
            </span>
        </div>
    </header>

    <div class="main">
        <div class="data-info" id="data-info" style="display:none;"></div>



        <!-- Section 2: 8 Channel Heatmaps -->
        <div id="sec-heatmaps" style="display:none;">
            <div class="section-title"><span class="material-icons">grid_on</span>Visualization of Channels (One Day)</div>
            <div class="grid-4x2" id="heatmaps-grid"></div>
        </div>

        <!-- Section 3: Feature Value Distribution (Sample) -->
        <div id="sec-samples" style="display:none;margin-top:24px;">
            <div class="section-title"><span class="material-icons">show_chart</span>Feature Value Distributions (Sample)</div>
            <div class="grid-2x1" id="samples-grid"></div>
        </div>

        <!-- Section 4: Seasonality -->
        <div id="sec-seasonality" style="display:none;margin-top:24px;">
            <div class="section-title"><span class="material-icons">date_range</span>Seasonality Analysis (Overlay by Year)</div>
            <div class="grid-2x1" id="seasonality-grid"></div>
        </div>



        <div class="loading-overlay" id="loading-state">
            <span class="material-icons">autorenew</span>
            Đang tải dữ liệu ngày mới nhất...
        </div>
    </div>

    <script src="/js/eda/app.js"></script>
</body>
</html>
